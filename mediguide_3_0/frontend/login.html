<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediGuide User Login</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#2b9cff,#5dc3ff);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.96);
    border-radius:14px;
    padding:22px;
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

h2{
    margin:0 0 14px;
    color:#0c4070;
}

label{
    display:block;
    margin:10px 0 6px;
    font-size:14px;
    font-weight:700;
    color:#17324d;
}

input{
    width:100%;
    padding:11px;
    border:1px solid #c6dff5;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:14px;
    border:none;
    border-radius:10px;
    background:#0a84ff;
    color:#fff;
    padding:11px;
    cursor:pointer;
    font-weight:700;
}

.message{
    margin-bottom:12px;
    border-radius:10px;
    padding:10px;
    font-size:13px;
    display:none;
}

.ok{background:#d7f7e2;color:#12552a;border:1px solid #b5e7c8;}
.err{background:#ffe2e2;color:#782323;border:1px solid #f3b6b6;}

.links{
    margin-top:12px;
    display:flex;
    justify-content:space-between;
    gap:8px;
    font-size:13px;
}

.links a{
    color:#15517f;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    color:#15517f;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">
    <h2>User Login</h2>
    <div id="loginMsg" class="message"></div>
    <form id="loginForm">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" type="text" required placeholder="username">
        
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required placeholder="password">
        
        <button type="submit">Login</button>
    </form>
    
    <div class="links">
        <a href="/signup">Create Account</a>
        <a href="#" onclick="alert('Feature coming soon')">Forgot Password?</a>
    </div>
</div>

<div class="back-link">
    <a href="/">← Back to Main Page</a>
</div>

<script src="login.js"></script>

</body>
</html>
