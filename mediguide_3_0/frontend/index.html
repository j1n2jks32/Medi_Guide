<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediGuide</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2b9cff, #5dc3ff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: #6bb6f5;
    padding: 28px;
    border-radius: 22px;
    width: 100%;
    max-width: 420px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

select, input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    margin: 10px 0;
    font-size: 15px;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-bottom: 10px;
}

button.voice {
    background: linear-gradient(135deg,#ff9800,#ff5722);
}

.result {
    margin-top: 18px;
    font-size: 15px;
}

.loading-box {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 15px;
}

.spinner {
    width: 26px;
    height: 26px;
    border: 4px solid rgba(255,255,255,0.4);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.emergency {
    background: #ff2e2e;
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
}

.confidence-bar {
    width: 100%;
    height: 12px;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    margin: 8px 0 15px;
    overflow: hidden;
}

.confidence-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,#00ff88,#00c3ff);
    transition: width 1s ease;
}

/* 🏥 Hospital UI */
.hospital-box{
    margin-top:15px;
    background: rgba(255,255,255,0.15);
    padding:12px;
    border-radius:12px;
}

.hospital-item{
    padding:8px;
    border-bottom:1px solid rgba(255,255,255,0.3);
}

.hospital-item:last-child{
    border-bottom:none;
}

.hospital-item a{
    color:white;
    font-size:14px;
    text-decoration:underline;
}

.ambulance-btn{
    display:block;
    margin-top:12px;
    padding:12px;
    background:#ff2e2e;
    text-align:center;
    border-radius:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* 📜 History */
.history {
    margin-top: 20px;
}

.history-item {
    background: rgba(255,255,255,0.15);
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 14px;
    margin-bottom: 6px;
}

small {
    display: block;
    margin-top: 15px;
    opacity: 0.85;
}

/* 📍 Location Notice */
.location-note{
    font-size:13px;
    opacity:0.9;
    margin-top:6px;
}

.top-links{
    margin:10px 0 14px;
}

.top-links a{
    display:block;
    text-align:center;
    text-decoration:none;
    color:white;
    font-size:14px;
    padding:10px;
    border-radius:10px;
    background: rgba(255,255,255,0.18);
}

.top-links a:hover{
    background: rgba(255,255,255,0.28);
}
</style>
</head>

<body>

<div class="card">

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <img src="/logo.svg" alt="MediGuide" style="height:48px;width:48px;border-radius:8px;background:rgba(255,255,255,0.12);padding:6px;"/>
        <div>
            <h1 style="margin:0;font-size:22px;">🩺 MediGuide</h1>
            <div style="opacity:.95;font-size:14px;margin-top:4px;">AI Smart Medicine Recommendation</div>
        </div>
    </div>

    <div class="top-links">
        <a href="/profile">User Profile</a>
        <a href="/heart-monitor">Heart Health Monitor</a>
    </div>

    <!-- 🎤 Voice Language -->
    <select id="voiceLang">
        <option value="kn-IN">Kannada</option>
        <option value="hi-IN">Hindi</option>
        <option value="en-US">English</option>
    </select>

    <!-- 🧠 Symptom Input -->
    <input id="symptoms" placeholder="Enter your symptoms">

    <!-- 🧠 Analyze Button -->
    <button onclick="getRecommendation()">🧠 Analyze Symptoms</button>

    <!-- 🎤 Voice Button -->
    <button class="voice" onclick="startVoice()">🎤 Speak Symptoms</button>

    <div class="location-note">
        📍 Allow location access for nearby hospital suggestions
    </div>

    <!-- 🧠 Result Output -->
    <div class="result" id="result"></div>

    <!-- 📜 History -->
    <div class="history">
        <h4>📜 Recent History</h4>
        <div id="historyList"></div>
    </div>

    <!-- ⚠ Disclaimer -->
    <small>
        ⚠ AI medical guidance only. Always consult a certified doctor.
    </small>

</div>

<script src="script.js"></script>

</body>
</html>
