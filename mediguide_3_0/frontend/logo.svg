<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="MediGuide medical logo">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0072ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c6ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    .bg-circle { 
      fill: #ffffff; 
      filter: drop-shadow(0 2px 8px rgba(0,114,255,0.15));
    }
    .pulse-ring { 
      fill: none; 
      stroke: url(#blueGrad); 
      stroke-width: 2; 
      opacity: 0;
      transform-origin: 60px 60px;
      animation: pulseRing 2s ease-out infinite;
    }
    .main-icon { 
      fill: url(#blueGrad); 
      transform-origin: 60px 60px;
      animation: gentleFloat 3s ease-in-out infinite;
      filter: url(#glow);
    }
    .cross-plus { 
      fill: #ffffff; 
      transform-origin: 60px 60px;
      animation: rotateCross 4s linear infinite;
    }
    .heart-beat {
      fill: url(#pulseGrad);
      transform-origin: 60px 60px;
      animation: heartBeat 1.5s ease-in-out infinite;
    }
    
    @keyframes pulseRing {
      0% { 
        transform: scale(0.8); 
        opacity: 0;
      }
      50% { 
        opacity: 0.3;
      }
      100% { 
        transform: scale(1.3); 
        opacity: 0;
      }
    }
    
    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    
    @keyframes rotateCross {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      25% { transform: scale(1.1); opacity: 0.8; }
      45% { transform: scale(0.95); opacity: 0.4; }
    }
  </style>

  <!-- Background circle with shadow -->
  <circle cx="60" cy="60" r="52" class="bg-circle"/>
  
  <!-- Pulse ring animation -->
  <circle cx="60" cy="60" r="45" class="pulse-ring"/>
  
  <!-- Main medical cross with rounded edges -->
  <g class="main-icon">
    <!-- Vertical bar -->
    <rect x="52" y="25" width="16" height="70" rx="8" />
    <!-- Horizontal bar -->
    <rect x="25" y="52" width="70" height="16" rx="8" />
  </g>
  
  <!-- Central heart pulse indicator -->
  <path d="M60 55 C58 53, 56 53, 55 55 C54 57, 56 59, 60 63 C64 59, 66 57, 65 55 C64 53, 62 53, 60 55 Z" 
        class="heart-beat" />
  
  <!-- Small medical plus indicators -->
  <g class="cross-plus" opacity="0.7">
    <rect x="58" y="30" width="4" height="12" rx="2" fill="#ffffff" />
    <rect x="54" y="34" width="12" height="4" rx="2" fill="#ffffff" />
  </g>
  
  <!-- Corner medical symbols -->
  <g opacity="0.5">
    <!-- Top-left -->
    <rect x="28" y="28" width="6" height="6" rx="3" fill="url(#blueGrad)" />
    <!-- Top-right -->
    <rect x="86" y="28" width="6" height="6" rx="3" fill="url(#blueGrad)" />
    <!-- Bottom-left -->
    <rect x="28" y="86" width="6" height="6" rx="3" fill="url(#blueGrad)" />
    <!-- Bottom-right -->
    <rect x="86" y="86" width="6" height="6" rx="3" fill="url(#blueGrad)" />
  </g>

</svg>
