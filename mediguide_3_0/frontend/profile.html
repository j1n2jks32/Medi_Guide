<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediGuide - User Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2b9cff, #5dc3ff);
    margin: 0;
    padding: 20px;
    min-height: 100vh;
}

.container {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 30px;
    max-width: 800px;
    margin: 0 auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.header {
    background: linear-gradient(135deg, #0072ff, #00c6ff);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 30px;
}

.header h1 {
    margin: 0;
    font-size: 24px;
}

.header p {
    margin: 5px 0 0;
    opacity: 0.9;
}

.profile-section {
    margin-bottom: 25px;
}

.section-title {
    font-size: 18px;
    font-weight: bold;
    color: #0072ff;
    margin-bottom: 15px;
    border-bottom: 2px solid #0072ff;
    padding-bottom: 5px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #333;
}

.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    box-sizing: border-box;
    transition: border-color 0.3s;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #0072ff;
}

.medicine-list {
    margin-top: 20px;
}

.medicine-item {
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.medicine-info {
    flex: 1;
}

.medicine-name {
    font-weight: bold;
    color: #0072ff;
    margin-bottom: 5px;
}

.reminder-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

.reminder-input {
    flex: 1;
    padding: 8px;
    border: 2px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
}

.add-btn {
    background: #0072ff;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

.add-btn:hover {
    background: #0056b3;
}

.delete-btn {
    background: #dc3545;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
}

.delete-btn:hover {
    background: #c82333;
}

.save-btn {
    background: linear-gradient(135deg, #28a745, #20c997);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    font-weight: bold;
    transition: transform 0.2s;
}

.save-btn:hover {
    transform: scale(1.05);
}

.back-link {
    display: inline-block;
    margin-top: 20px;
    color: #0072ff;
    text-decoration: none;
    font-size: 14px;
}

.back-link:hover {
    text-decoration: underline;
}

.success-message {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 20px;
    text-align: center;
}

@media (max-width: 600px) {
    .container {
        margin: 10px;
        padding: 20px;
    }
    
    .medicine-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
    
    .reminder-section {
        flex-direction: column;
        align-items: stretch;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:12px;">
            <img src="/logo.svg" alt="MediGuide" style="height:40px;width:40px;border-radius:8px;background:rgba(255,255,255,0.12);padding:4px;"/>
                <div>
                    <h1>ðŸ‘¤ MediGuide User Profile</h1>
                    <p>Manage your profile and medicine reminders</p>
                    <div id="loggedInUser" style="font-size:12px;opacity:0.95;margin-top:4px;">Logged in</div>
                </div>
            </div>
            <button id="logoutBtn" type="button" class="add-btn" style="width:auto;min-width:110px;">Logout</button>
        </div>
    </div>

    <div id="successMessage" class="success-message" style="display: none;"></div>

    <form id="profileForm">
        <div class="profile-section">
            <div class="section-title">Personal Information</div>
            
            <div class="form-group">
                <label for="userName">Full Name</label>
                <input type="text" id="userName" name="userName" required placeholder="Enter your full name">
            </div>
            
            <div class="form-group">
                <label for="userPhone">Phone Number (with country code)</label>
                <input type="tel" id="userPhone" name="userPhone" required placeholder="+1234567890" pattern="[+][0-9]{10,15}">
            </div>
            
            <div class="form-group">
                <label for="userEmail">Email Address</label>
                <input type="email" id="userEmail" name="userEmail" required placeholder="your.email@example.com">
            </div>
            
            <div class="form-group">
                <label for="userAge">Age</label>
                <input type="number" id="userAge" name="userAge" min="1" max="120" required placeholder="25">
            </div>
            
            <div class="form-group">
                <label for="userGender">Gender</label>
                <select id="userGender" name="userGender" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>

        <div class="profile-section">
            <div class="section-title">Medicine Reminders</div>
            
            <div class="medicine-list" id="medicineList">
                <!-- Medicines will be added here dynamically -->
            </div>
            
            <div class="form-group">
                <div class="reminder-section">
                    <input type="text" id="newMedicine" class="reminder-input" placeholder="Medicine name">
                    <input type="time" id="reminderTime" class="reminder-input" placeholder="09:00">
                    <button type="button" class="add-btn" onclick="addMedicine()">Add Reminder</button>
                </div>
                <div style="font-size:12px;color:#555;margin-top:8px;">
                    Tip: Save Profile stores reminders on the server. Background scheduler sends WhatsApp reminders automatically.
                </div>
            </div>
        </div>

        <button type="submit" class="save-btn">ðŸ’¾ Save Profile</button>
        <button type="button" class="add-btn" style="width:100%;margin-top:10px;" onclick="sendTestWhatsAppNow()">
            Send Test WhatsApp Now
        </button>
    </form>

    <center>
        <a href="/" class="back-link">â† Back to Main Page</a>
    </center>
</div>

<script src="profile.js"></script>

</body>
</html>
